# kitty.conf — minimal config, everything else is default
# full docs: https://sw.kovidgoyal.net/kitty/conf/

font_family      family="IosevkaTerm Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        18.0

include current-theme.conf

# allow external processes (e.g. stream deck) to control kitty via socket
allow_remote_control socket-only
listen_on unix:/tmp/kitty.sock
