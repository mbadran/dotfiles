# Starship Prompt Configuration
# https://starship.rs/config/ | https://www.nerdfonts.com/cheat-sheet
# Alternatives and design notes: ../working/starship-notes.toml

"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 250          # for scanning files
command_timeout = 2000      # for executing commands

# left prompt -- minimal -- key details often referred to
format = """
[](fg:blue)\
$directory\
[](bg:teal fg:blue)\
$git_branch\
[](bg:white fg:teal)\
$git_status\
$git_metrics\
[](bg:pink fg:white)\
$jobs\
[](bg:lavender fg:pink)\
$shell\
$shlvl\
[](fg:lavender)\
$line_break\
$character"""

# right prompt -- broader -- supplementary details less referred to
right_format = """
[](mantle)\
$custom\
[](bg:mantle fg:blue)\
$docker_context\
$conda\
$package\
[](bg:blue fg:mauve)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](bg:mauve fg:red)\
$status\
[](bg:red fg:overlay2)\
$env_var\
[](bg:overlay2 fg:overlay0)\
$username\
[](bg:overlay0 fg:surface2)\
$hostname\
[](bg:surface2 fg:surface1)\
$cmd_duration\
[](bg:surface1 fg:surface0)\
$time\
$os\
[](fg:surface0)"""

palette = "catppuccin_macchiato"

############################################################ left prompt modules

[directory]
style = "bg:blue fg:crust"
format = "[ $path]($style)[$read_only ](bg:blue fg:yellow)"
truncation_length = 10
truncate_to_repo = true
truncation_symbol = "َ°½ک/"
home_symbol = "َ°®§"
read_only = " َ°ڈ®"
use_os_path_sep = true
repo_root_style = "bg:blue fg:crust"
repo_root_format = "[ َ°³ڈ $repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Documents" = "َ°ˆ™"
"Downloads" = ""
"Music" = "َ°‌ڑ"
"Pictures" = ""
"Developer" = "َ°²‹"

[git_branch]
symbol = ""
style = "bg:teal fg:crust"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:white fg:crust"
format = "([ $all_status]($style)[$ahead_behind ]($style))"

[git_metrics]
disabled = false
added_style = "bold bg:white fg:green"
deleted_style = "bold bg:white fg:red"
format = "([+$added ]($added_style))([-$deleted ]($deleted_style))"

[jobs]
style = "bg:pink fg:black"
symbol = "َ°’²"
number_threshold = 2
format = "[ $symbol ]($style)([$number ]($style))"

[shell]
disabled = false
style = "bg:lavender fg:crust"
format = "[ $indicator ]($style)"
bash_indicator = ""
fish_indicator = "َ°ˆ؛"
zsh_indicator = "َ±†ƒ"
powershell_indicator = "َ°¨ٹ"
pwsh_indicator = "َ°¨ٹ"
ion_indicator = "َ±ھ¯"
elvish_indicator = "َ°³‌"
tcsh_indicator = "َ°°©"
xonsh_indicator = ""
cmd_indicator = ""
nu_indicator = "َ±’ٹ"
unknown_indicator = ""

[shlvl]
disabled = false
style = "bold bg:lavender fg:crust"
format = "([$shlvl ]($style))"

[character]
disabled = false
success_symbol = '[َ°چں](fg:text)'
error_symbol = '[َ°چ‍](fg:red)'
vimcmd_symbol = '[](fg:green)'

########################################################### right prompt modules

[os]
disabled = false
style = "bg:surface0 fg:subtext1"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = ""
Ubuntu = "َ°•ˆ"
SUSE = ""
Raspbian = "َ°گ؟"
Mint = "َ°£­"
Macos = "َ°€µ"
Manjaro = ""
Linux = "َ°Œ½"
Gentoo = "َ°£¨"
Fedora = "َ°£›"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "َ°£‡"
Artix = "َ°£‡"
CentOS = ""
Debian = "َ°£ڑ"
Redhat = "َ±„›"
RedHatEnterprise = "َ±„›"

[time]
disabled = false
time_format = "%R"
style = "bg:surface0 fg:subtext1"
format = "[ $time]($style)"

[cmd_duration]
disabled = false
show_milliseconds = false
min_time = 30000
show_notifications = true
style = "bg:surface1 fg:subtext0"
format = "[ $duration َ±¦ں ]($style)"

[hostname]
style = "bg:surface2 fg:peach"
format = "[ $hostname$ssh_symbol َ°چ¹ ]($style)"

[username]
style_user = "bg:overlay0 fg:crust"
style_root = "italic bg:overlay0 fg:white"
format = "[ $user  ]($style)"

[env_var.PROGRAM]
description = "The terminal program in the environment"
variable = "TERM_PROGRAM"
style = "bg:overlay2 fg:white"
format = "[ $env_value  ]($style)"

[status]
disabled = false
style = "bg:red fg:crust"
symbol = "َ°‡·"
not_executable_symbol = "َ°”¢"
not_found_symbol = "َ°¢ڑ"
sigint_symbol = "َ°ٹ "                    # cancelling process
signal_symbol = "َ°’²"                    # suspending process (matches jobs symbol)
map_symbol = true
format = "([ $common_meaning$maybe_int$signal_name ]($style))[$symbol ]($style)"

############################################################ context modules

[conda]                                 # untested
symbol = "  "
style = "bg:blue fg:crust"
format = "[ $symbol$environment ]($style)"
ignore_base = false

[docker_context]                        # untested
symbol = ""
style = "bg:blue fg:crust"
format = "[ $symbol ($context) ]($style)"

[package]                               # untested
style = "bg:blue fg:crust"
format = "[ $package ]($style)"

########################################################### language modules

[c]
symbol = " "
style = "bg:mauve fg:crust"
format = "[ $symbol$version ]($style)"

[rust]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[nodejs]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[php]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[java]
symbol = " "
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[kotlin]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[haskell]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[python]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) (#$virtualenv) ]($style)"

################################################################# custom modules

