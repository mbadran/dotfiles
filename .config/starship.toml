# Starship Prompt Configuration
# Based on: https://starship.rs/presets/catppuccin-powerline (macchiato)
# https://starship.rs/config/ | https://www.nerdfonts.com/cheat-sheet
# Alternatives and design notes: ../working/starship-notes.toml
#
# CAUTION: format/right_format blocks contain 4 powerline PUA glyphs
# (U+E0B6, U+E0B0, U+E0B2, U+E0B4) that get stripped by some text tools.
# Edit those blocks with care ŌĆö run the verification script in TESTING.md after.

"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 250          # for scanning files
command_timeout = 2000      # for executing commands

# left prompt -- minimal -- key details often referred to
format = """
[ŅéČ](fg:blue)\
$directory\
[Ņé░](bg:teal fg:blue)\
$git_branch\
[Ņé░](bg:white fg:teal)\
$git_status\
$git_metrics\
[Ņé░](bg:pink fg:white)\
$jobs\
[Ņé░](bg:lavender fg:pink)\
$shell\
$shlvl\
[Ņé┤](fg:lavender)\
$line_break\
$character"""

# right prompt -- broader -- supplementary details less referred to
right_format = """
[ŅéČ](mantle)\
$custom\
[Ņé▓](bg:mantle fg:blue)\
$docker_context\
$conda\
$package\
[Ņé▓](bg:blue fg:mauve)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[Ņé▓](bg:mauve fg:red)\
$status\
[Ņé▓](bg:red fg:overlay2)\
$env_var\
[Ņé▓](bg:overlay2 fg:overlay0)\
$username\
[Ņé▓](bg:overlay0 fg:surface2)\
$hostname\
[Ņé▓](bg:surface2 fg:surface1)\
$cmd_duration\
[Ņé▓](bg:surface1 fg:surface0)\
$time\
$os\
[Ņé┤](fg:surface0)"""

palette = "catppuccin_macchiato"

############################################################ left prompt modules

[directory]
style = "bg:blue fg:crust"
format = "[ $path]($style)[$read_only ](bg:blue fg:yellow)"
truncation_length = 10
truncate_to_repo = true
truncation_symbol = "¾░Įś/"
home_symbol = "¾░«¦"
read_only = " ¾░Å«"
use_os_path_sep = true
repo_root_style = "bg:blue fg:crust"
repo_root_format = "[ ¾░│Å $repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Documents" = "¾░łÖ"
"Downloads" = "’ĆÖ"
"Music" = "¾░ØÜ"
"Pictures" = "’ĆŠ"
"Developer" = "¾░▓ŗ"

[git_branch]
symbol = ""
style = "bg:teal fg:crust"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:white fg:crust"
format = "([ $all_status]($style)[$ahead_behind ]($style))"

[git_metrics]
disabled = false
added_style = "bold bg:white fg:green"
deleted_style = "bold bg:white fg:red"
format = "([+$added ]($added_style))([-$deleted ]($deleted_style))"

[jobs]
style = "bg:pink fg:black"
symbol = "¾░Æ▓"
number_threshold = 2
format = "[ $symbol ]($style)([$number ]($style))"

[shell]
disabled = false
style = "bg:lavender fg:crust"
format = "[ $indicator ]($style)"
bash_indicator = ""
fish_indicator = "¾░ł║"
zsh_indicator = "¾▒åā"
powershell_indicator = "¾░©Ŗ"
pwsh_indicator = "¾░©Ŗ"
ion_indicator = "¾▒¬»"
elvish_indicator = "¾░│Ø"
tcsh_indicator = "¾░░®"
xonsh_indicator = ""
cmd_indicator = ""
nu_indicator = "¾▒ÆŖ"
unknown_indicator = ""

[shlvl]
disabled = false
style = "bold bg:lavender fg:crust"
format = "([$shlvl ]($style))"

[character]
disabled = false
success_symbol = "[¾░Ź¤](fg:text)"
error_symbol = "[¾░Ź×](fg:red)"
vimcmd_symbol = "[](fg:green)"

########################################################### right prompt modules

[os]
disabled = false
style = "bg:surface0 fg:subtext1"
format = "[ $symbol ]($style)"

[os.symbols]
Windows = ""
Ubuntu = "¾░Ģł"
SUSE = ""
Raspbian = "¾░É┐"
Mint = "¾░ŻŁ"
Macos = "¾░ĆĄ"
Manjaro = ""
Linux = "¾░īĮ"
Gentoo = "¾░Ż©"
Fedora = "¾░Żø"
Alpine = ""
Amazon = ""
Android = ""
AOSC = ""
Arch = "¾░Żć"
Artix = "¾░Żć"
CentOS = ""
Debian = "¾░ŻÜ"
Redhat = "¾▒äø"
RedHatEnterprise = "¾▒äø"

[time]
disabled = false
time_format = "%R"
style = "bg:surface0 fg:subtext1"
format = "[ $time]($style)"

[cmd_duration]
disabled = false
show_milliseconds = false
min_time = 30000
show_notifications = true
style = "bg:surface1 fg:subtext0"
format = "[ $duration ¾▒”¤ ]($style)"

[hostname]
style = "bg:surface2 fg:peach"
format = "[ $hostname$ssh_symbol ¾░Ź╣ ]($style)"

[username]
style_user = "bg:overlay0 fg:crust"
style_root = "italic bg:overlay0 fg:white"
format = "[ $user  ]($style)"

[env_var.PROGRAM]
description = "The terminal program in the environment"
variable = "TERM_PROGRAM"
style = "bg:overlay2 fg:white"
format = "[ $env_value  ]($style)"

[status]
disabled = false
style = "bg:red fg:crust"
symbol = "¾░ćĘ"
not_executable_symbol = "¾░öó"
not_found_symbol = "¾░óÜ"
sigint_symbol = "¾░ŖĀ"                    # cancelling process
signal_symbol = "¾░Æ▓"                    # suspending process (matches jobs symbol)
map_symbol = true
format = "([ $common_meaning$maybe_int$signal_name ]($style))[$symbol ]($style)"

############################################################ context modules

# TODO: test
[conda]
symbol = "  "
style = "bg:blue fg:crust"
format = "[ $symbol$environment ]($style)"
ignore_base = false

# TODO: test
[docker_context]
symbol = ""
style = "bg:blue fg:crust"
format = "[ $symbol ($context) ]($style)"

# TODO: test
[package]
style = "bg:blue fg:crust"
format = "[ $package ]($style)"

############################################################### language modules

[c]
symbol = " "
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[haskell]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[java]
symbol = " "
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[kotlin]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[nodejs]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[php]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[python]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) (#$virtualenv) ]($style)"

[rust]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

################################################################# custom modules

# TODO: REPLACE: morsel ŌĆö see working/morsel-design-notes.md
[custom.anchor]
description = "Morse code tutor ŌĆö random letter with Google pictogram"
command = """python3 -c "
import random
chars = {
  'A': ('┬Ę Ōöü',      'A┬Ęrchery'),
  'B': ('Ōöü ┬Ę ┬Ę ┬Ę',  'B┬Ęanjo'),
  'C': ('Ōöü ┬Ę Ōöü ┬Ę',  'C┬Ęandy'),
  'D': ('Ōöü ┬Ę ┬Ę',    'D┬Ęog'),
  'E': ('┬Ę',        'E┬Ęye'),
  'F': ('┬Ę ┬Ę Ōöü ┬Ę',  'F┬Ęiretruck'),
  'G': ('Ōöü Ōöü ┬Ę',    'G┬Ęiraffe'),
  'H': ('┬Ę ┬Ę ┬Ę ┬Ę',  'H┬Ęippo'),
  'I': ('┬Ę ┬Ę',      'I┬Ęnsect'),
  'J': ('┬Ę Ōöü Ōöü Ōöü',  'J┬Ęet'),
  'K': ('Ōöü ┬Ę Ōöü',    'K┬Ęite'),
  'L': ('┬Ę Ōöü ┬Ę ┬Ę',  'L┬Ęaboratory'),
  'M': ('Ōöü Ōöü',      'M┬Ęustache'),
  'N': ('Ōöü ┬Ę',      'N┬Ęet'),
  'O': ('Ōöü Ōöü Ōöü',    'O┬Ęrchestra'),
  'P': ('┬Ę Ōöü Ōöü ┬Ę',  'P┬Ęaddle'),
  'Q': ('Ōöü Ōöü ┬Ę Ōöü',  'Q┬Ęuarterback'),
  'R': ('┬Ę Ōöü ┬Ę',    'R┬Ęobot'),
  'S': ('┬Ę ┬Ę ┬Ę',    'S┬Ęubmarine'),
  'T': ('Ōöü',        'T┬Ęape'),
  'U': ('┬Ę ┬Ę Ōöü',    'U┬Ęnicorn'),
  'V': ('┬Ę ┬Ę ┬Ę Ōöü',  'V┬Ęacuum'),
  'W': ('┬Ę Ōöü Ōöü',    'W┬Ęand'),
