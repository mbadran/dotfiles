# Barista - A prompt theme for Starship
# By mbadran <mebadran@gmail.com>
# Based on: https://starship.rs/presets/catppuccin-powerline (macchiato)
#
# https://starship.rs/config/ | https://www.nerdfonts.com/cheat-sheet
# Notes and experiments: ../working/starship-notes.toml

"$schema" = 'https://starship.rs/config-schema.json'

scan_timeout = 250          # for scanning files
command_timeout = 2000      # for executing commands

# left prompt -- minimal -- key details often referred to
format = """
[](fg:blue)\
$directory\
[](bg:teal fg:blue)\
$git_branch\
[](bg:white fg:teal)\
$git_status\
$git_metrics\
[](bg:pink fg:white)\
$jobs\
[](bg:lavender fg:pink)\
$shell\
$shlvl\
[](fg:lavender)\
$line_break\
$character"""

# right prompt -- broader -- supplementary details less referred to
right_format = """
[](mantle)\
$custom\
[](bg:mantle fg:blue)\
$docker_context\
$conda\
$package\
[](bg:blue fg:mauve)\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
[](bg:mauve fg:red)\
$status\
[](bg:red fg:overlay2)\
$env_var\
[](bg:overlay2 fg:overlay0)\
$username\
[](bg:overlay0 fg:surface2)\
$hostname\
[](bg:surface2 fg:surface1)\
$cmd_duration\
[](bg:surface1 fg:surface0)\
$time\
$os\
[](fg:surface0)"""

palette = "catppuccin_macchiato"

############################################################ left prompt modules

[directory]
style = "bg:blue fg:crust"
format = "[ $path ]($style)([$read_only ]($style fg:yellow))"
truncation_length = 10
truncation_symbol = "󰽘/"
truncate_to_repo = true
home_symbol = ""
read_only = " 󰏮"
use_os_path_sep = true
repo_root_style = "bg:blue fg:crust"
repo_root_format = "[ 󰳏 $repo_root]($repo_root_style)[$path ]($style)"

[directory.substitutions]
"Documents" = "󰈙"
"Downloads" = ""
"Music" = "󰝚"
"Pictures" = ""
"Developer" = "󰲋"

[git_branch]
symbol = ""
style = "bg:teal fg:crust"
format = "[ $symbol $branch ]($style)"

[git_status]
style = "bg:white fg:crust"
format = "([ $all_status]($style)[$ahead_behind ]($style))"

[git_metrics]
disabled = false
added_style = "bold bg:white fg:green"
deleted_style = "bold bg:white fg:red"
format = "([+$added ]($added_style))([-$deleted ]($deleted_style))"

[jobs]
style = "bg:pink fg:black"
symbol = "⚡︎"
number_threshold = 2
format = "[ $symbol ]($style)([$number ]($style))"

[shell]
disabled = false
style = "bg:lavender fg:crust"
format = "[ $indicator ]($style)"
bash_indicator = ""
fish_indicator = "󰈺"
zsh_indicator = "󱆃"
powershell_indicator = "󰨊"
pwsh_indicator = "󰨊"
ion_indicator = "󱪯"
elvish_indicator = "󰳝"
tcsh_indicator = "󰰩"
xonsh_indicator = ""
cmd_indicator = ""
nu_indicator = "󱒊"
unknown_indicator = ""

[shlvl]
disabled = false
style = "bold bg:lavender fg:crust"
format = "([$shlvl ]($style))"

[character]
disabled = false
success_symbol = "[󰍟](fg:text)"
error_symbol = "[󰍞](fg:red)"
vimcmd_symbol = "[](fg:green)"

########################################################### right prompt modules

[os]
disabled = false
style = "bg:surface0 fg:subtext1"
format = "[ $symbol ]($style)"

[os.symbols]
AOSC = ""
Alpine = ""
Amazon = ""
Android = ""
Arch = "󰣇"
Artix = "󰣇"
CentOS = ""
Debian = "󰣚"
Fedora = "󰣛"
Gentoo = "󰣨"
Linux = "󰌽"
Macos = "󰀵"
Manjaro = ""
Mint = "󰣭"
Raspbian = "󰐿"
RedHatEnterprise = "󱄛"
Redhat = "󱄛"
SUSE = ""
Ubuntu = "󰕈"
Windows = ""

[time]
disabled = false
time_format = "%R"
style = "bg:surface0 fg:subtext1"
format = "[ $time]($style)"

[cmd_duration]
disabled = false
show_milliseconds = false
min_time = 30000
show_notifications = true
style = "bg:surface1 fg:subtext0"
format = "[ $duration 󱦟 ]($style)"

[hostname]
style = "bg:surface2 fg:peach"
format = "[ $hostname$ssh_symbol 󰍹 ]($style)"

[username]
style_user = "bg:overlay0 fg:crust"
style_root = "italic bg:overlay0 fg:white"
format = "[ $user  ]($style)"

[env_var.PROGRAM]
description = "The terminal program in the environment"
variable = "TERM_PROGRAM"
style = "bg:overlay2 fg:white"
format = "[ $env_value  ]($style)"

[status]
disabled = false
style = "bg:red fg:crust"
symbol = "󰇷"
not_executable_symbol = "󰔢"
not_found_symbol = "󰢚"
sigint_symbol = "󰊠"                    # cancelling process
signal_symbol = "⚡︎"                    # suspending process (matches jobs symbol)
map_symbol = true
format = "([ ·$status·( $common_meaning( $maybe_int))]($style))[( $signal_name( ·$signal_number·))]($style bold fg:white)[ $symbol ]($style)"

############################################################ context modules

[conda]
symbol = "  "
style = "bg:blue fg:crust"
format = "[ $symbol$environment ]($style)"
ignore_base = false

[docker_context]
symbol = ""
style = "bg:blue fg:crust"
format = "[ $symbol ($context) ]($style)"

[package]
style = "bg:blue fg:crust"
format = "[ $package ]($style)"

############################################################### language modules

[c]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[golang]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[haskell]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[java]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[kotlin]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[nodejs]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[php]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

[python]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) (#$virtualenv) ]($style)"

[rust]
symbol = ""
style = "bg:mauve fg:crust"
format = "[ $symbol ($version) ]($style)"

################################################################# custom modules

# TODO: REPLACE: morsel — see working/morsel-design-notes.md
[custom.anchor]
description = "Morse code tutor — random letter with Google pictogram"
command = """python3 -c "
import random
chars = {
  'A': ('· ━',      'A·rchery'),
  'B': ('━ · · ·',  'B·anjo'),
  'C': ('━ · ━ ·',  'C·andy'),
  'D': ('━ · ·',    'D·og'),
  'E': ('·',        'E·ye'),
  'F': ('· · ━ ·',  'F·iretruck'),
  'G': ('━ ━ ·',    'G·iraffe'),
  'H': ('· · · ·',  'H·ippo'),
  'I': ('· ·',      'I·nsect'),
  'J': ('· ━ ━ ━',  'J·et'),
  'K': ('━ · ━',    'K·ite'),
  'L': ('· ━ · ·',  'L·aboratory'),
  'M': ('━ ━',      'M·ustache'),
  'N': ('━ ·',      'N·et'),
  'O': ('━ ━ ━',    'O·rchestra'),
  'P': ('· ━ ━ ·',  'P·addle'),
  'Q': ('━ ━ · ━',  'Q·uarterback'),
  'R': ('· ━ ·',    'R·obot'),
  'S': ('· · ·',    'S·ubmarine'),
  'T': ('━',        'T·ape'),
  'U': ('· · ━',    'U·nicorn'),
  'V': ('· · · ━',  'V·acuum'),
  'W': ('· ━ ━',    'W·and'),
  'X': ('━ · · ━',  'X·-ray'),
  'Y': ('━ · ━ ━',  'Y·ard'),
  'Z': ('━ ━ · ·',  'Z·ebra'),
}
l = random.choice(list(chars))
m, p = chars[l]
print(m)
"
"""
when = "true"
style = "bg:mantle fg:surface2"
format = "[ $output ]($style)"

